apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: remindarr-env
  namespace: remindarr
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: remindarr-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        # Vault key holding the env for this app. Expected keys include:
        #   DATABASE_URL, DB_SCHEMA (=remindarr), BOT_TOKEN,
        #   TELEGRAM_WEBHOOK_SECRET, LLM_GATEWAY_URL, LLM_GATEWAY_API_KEY,
        #   LLM_GATEWAY_CHAT_PATH, LLM_MODEL, DEFAULT_TIMEZONE
        key: apps/remindarr/remindarr/env
